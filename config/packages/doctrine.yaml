doctrine:
    dbal:
        # Dev/prod use the Postgres service from compose.yaml via DATABASE_URL.
        # The test environment overrides this with a local SQLite file (see when@test).
        url: '%env(resolve:DATABASE_URL)%'
        profiling_collect_backtrace: '%kernel.debug%'
        # The Messenger transport owns its own table; keep it out of ORM schema
        # introspection so migrations:diff and schema:validate ignore it.
        schema_filter: ~^(?!messenger_messages)~
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App

when@test:
    doctrine:
        dbal:
            # Tests run against their own SQLite file, recreated per test case.
            url: 'sqlite:///%kernel.project_dir%/var/absence_test.sqlite'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
